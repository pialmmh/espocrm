; ============================================================================
; EspoCRM deployment profile — LOCAL (SSH to 127.0.0.1)
; ----------------------------------------------------------------------------
; "Local" here just means the SSH target is 127.0.0.1 — the deploy mechanism
; is identical to any other profile. Add more profiles for staging/prod by
; copying this file.
; ============================================================================

[local]
description         = Local deploy via SSH to 127.0.0.1

; ---- SSH target ----
ssh_host            = 127.0.0.1
ssh_port            = 22
ssh_user            = mustafa
ssh_key             = ~/.ssh/id_rsa

; ---- Install path on the target ----
target_dir          = /opt/espocrm
www_user            = www-data
www_group           = www-data

; ---- Built-in PHP server port (single systemd unit created by this script).
; For production use a real web server; override site_url / skip the service.
serve_port          = 7080
site_url            = http://localhost:7080

; ---- MASTER database ----
; This is the control DB our fork's bootstrap.php looks up on every request
; to resolve <subdomain>.host → tenant DB (see commit fa6f571ed8).
master_db_host      = 127.0.0.1
master_db_port      = 3306
master_db_name      = espocrm_master
master_db_user      = root
master_db_password  = 123456

; ---- Default tenant row (inserted into master.tenantInfo so `localhost`
; resolves to a working DB out of the box; other tenants are added via the
; TenantManager API at runtime).
default_tenant_slug    = master
default_tenant_dbname  = espocrm_master

; ---- Build steps executed locally before transfer ----
run_composer_install = true
run_npm_build        = false

; ---- Admin API key rotation (final step of deploy.sh) ----
; mode = dedicated  → create/rotate user 'admin_api' (type=admin, ApiKey)
; mode = upgrade    → rotate api_key on the main admin user
admin_api_mode       = dedicated
admin_api_user_name  = admin_api
main_admin_name      = admin

; ---- Retention of old installs at ${target_dir}.bak-<timestamp> ----
keep_backups         = 3
