# =============================================================================
# BTCL — dev profile (this PC, iteration-friendly settings)
# =============================================================================
description: BTCL dev on localhost

# ---- SSH target ----
ssh_host: 127.0.0.1
ssh_port: 22
ssh_user: mustafa
ssh_key: ~/.ssh/id_rsa

# ---- Install path ----
target_dir: /opt/espocrm-ccl-dev
www_user: www-data
www_group: www-data

# ---- Built-in PHP server ----
serve_port: 7080
site_url: http://localhost:7080

# ---- MASTER DB (control DB: tenantInfo lookup) ----
master_db_host: 127.0.0.1
master_db_port: 3306
master_db_name: espocrm_master
master_db_user: root
master_db_password: '123456'

# ---- Default tenant (inserted into master.tenantInfo) ----
default_tenant_slug: ccl
default_tenant_dbname: espocrm_ccl_dev

# ---- Build steps ----
run_composer_install: true
run_npm_build: false

# ---- Retention ----
keep_backups: 3
